name: downstream-sdk-watch

on:
  schedule:
    - cron: "31 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      MANIFEST_URL: https://raw.githubusercontent.com/mitchins/xcode-runner-watch/main/latest/macos-latest.json
      BASELINE_PATH: .ci/xcode-runner-baseline.json
      UPDATE_BRANCH: ci/xcode-runner-watch
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Check for manifest changes
        id: check
        shell: bash
        run: |
          set -euo pipefail

          downloaded_manifest="$RUNNER_TEMP/xcode-runner-watch-manifest.json"
          curl -fsSL \
            --connect-timeout 10 \
            --max-time 120 \
            --retry 3 \
            --retry-delay 2 \
            --retry-connrefused \
            "$MANIFEST_URL" \
            -o "$downloaded_manifest"

          set +e
          python3 - "$downloaded_manifest" "$BASELINE_PATH" <<'PY'
          import json
          import sys
          from pathlib import Path


          def canonical(value):
              if isinstance(value, dict):
                  return {
                      key: canonical(item)
                      for key, item in sorted(value.items())
                      if key != "observed_at"
                  }
              if isinstance(value, list):
                  items = [canonical(item) for item in value]
                  return sorted(
                      items,
                      key=lambda item: json.dumps(item, sort_keys=True, separators=(",", ":")),
                  )
              return value


          incoming_path = Path(sys.argv[1])
          baseline_path = Path(sys.argv[2])
          if not baseline_path.exists():
              sys.exit(1)

          incoming = canonical(json.loads(incoming_path.read_text(encoding="utf-8")))
          baseline = canonical(json.loads(baseline_path.read_text(encoding="utf-8")))
          sys.exit(0 if incoming == baseline else 10)
          PY
          status=$?
          set -e

          if [[ $status -eq 0 ]]; then
            echo "changed=false" >>"$GITHUB_OUTPUT"
            exit 0
          elif [[ $status -eq 10 ]]; then
            echo "changed=true" >>"$GITHUB_OUTPUT"
            echo "downloaded_manifest=$downloaded_manifest" >>"$GITHUB_OUTPUT"
          else
            exit "$status"
          fi

      - name: Update baseline branch
        if: steps.check.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p "$(dirname "$BASELINE_PATH")"
          git fetch origin "$UPDATE_BRANCH":"refs/remotes/origin/$UPDATE_BRANCH" || true

          if git show-ref --verify --quiet "refs/remotes/origin/$UPDATE_BRANCH"; then
            git switch -C "$UPDATE_BRANCH" --track "origin/$UPDATE_BRANCH"
          else
            git switch -C "$UPDATE_BRANCH"
          fi

          cp "${{ steps.check.outputs.downloaded_manifest }}" "$BASELINE_PATH"
          git add "$BASELINE_PATH"

          if git diff --cached --quiet; then
            exit 0
          fi

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git commit -m "Update Xcode runner baseline"
          git push --force-with-lease --set-upstream origin "$UPDATE_BRANCH"

      - name: Open or reuse pull request
        if: steps.check.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          pr_json="$(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --head "$UPDATE_BRANCH" \
              --state open \
              --json number
          )"
          existing_pr="$(
            PR_JSON="$pr_json" python3 -c 'import json, os; pulls = json.loads(os.environ["PR_JSON"]); print(pulls[0]["number"] if pulls else "")'
          )"

          if [[ -n "$existing_pr" ]]; then
            echo "Open PR #$existing_pr already exists for $UPDATE_BRANCH"
            exit 0
          fi

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$UPDATE_BRANCH" \
            --title "Update Xcode runner baseline" \
            --body "This PR updates \`$BASELINE_PATH\` to match the latest published macOS runner manifest from \`xcode-runner-watch\`."
