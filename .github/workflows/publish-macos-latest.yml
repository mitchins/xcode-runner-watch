name: publish-macos-latest

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-macos-latest
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Capture manifest
        id: capture
        shell: bash
        run: |
          set -euo pipefail

          temp_manifest="$(mktemp)"
          RUNNER_LABEL="macos-latest" ./scripts/capture-xcode-runner-manifest.sh "$temp_manifest"

          if [[ -f latest/macos-latest.json ]] && python3 - "$temp_manifest" latest/macos-latest.json <<'PY'
          import json
          import sys
          from pathlib import Path


          def canonical(value):
              if isinstance(value, dict):
                  return {
                      key: canonical(item)
                      for key, item in sorted(value.items())
                      if key != "observed_at"
                  }
              if isinstance(value, list):
                  return [canonical(item) for item in value]
              return value


          incoming_path = Path(sys.argv[1])
          existing_path = Path(sys.argv[2])
          incoming = canonical(json.loads(incoming_path.read_text(encoding="utf-8")))
          existing = canonical(json.loads(existing_path.read_text(encoding="utf-8")))
          sys.exit(0 if incoming == existing else 1)
          PY
          then
            echo "changed=false" >>"$GITHUB_OUTPUT"
            rm -f "$temp_manifest"
            exit 0
          fi

          mkdir -p latest
          mv "$temp_manifest" latest/macos-latest.json
          echo "changed=true" >>"$GITHUB_OUTPUT"

      - name: Commit manifest
        if: steps.capture.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add latest/macos-latest.json

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Update macos-latest manifest"
          git push
